[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer        = true
optimizer_runs   = 200
via_ir           = false

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
anvil          = "http://127.0.0.1:8545"
arb_sepolia    = "${ARB_SEPOLIA_RPC}"
arb_mainnet    = "${ARB_MAINNET_RPC}"

[etherscan]
arb_sepolia  = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
arb_mainnet  = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }