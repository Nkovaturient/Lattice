[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
test     = "test"
script   = "script"
solc     = "0.8.34"
optimizer        = true
optimizer_runs   = 200
via_ir           = true

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
anvil          = "http://127.0.0.1:8545"
arb_sepolia    = "${ARB_SEPOLIA_RPC}"
arb_mainnet    = "${ARB_MAINNET_RPC}"

[etherscan]
arb_sepolia  = { key = "${ARBISCAN_API_KEY}", url = "https://sepolia-rollup.arbitrum.io/rpc" }
arb_mainnet  = { key = "${ARBISCAN_API_KEY}", url = "https://rpc.ankr.com/arbitrum/b9d65a15e8825e0d8ddb7c2a8baad5a51a9786a01b564f600fb131ae074b0130" }